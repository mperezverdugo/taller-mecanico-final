
# Identificación del Microservicio

spring.application.name=ms-automovil
server.port=8082


# Configuración de Base de Datos (MySQL)
# Apunta específicamente a la base de datos de automóviles
spring.datasource.url=jdbc:mysql://localhost:3306/db_automovil?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=


# Flyway: Gestión de Migraciones

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Seguridad extra: Si no hay archivos de migración, la app avisa y se detiene
spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:/db/migration


# JPA / Hibernate

# 'none' porque confiamos ciegamente en Flyway para la estructura
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# INFRAESTRUCTURA: Registro en Eureka

# Le avisamos a este servicio dónde encontrar al "conmutador" central
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# LOGS: Monitoreo para Desarrollo

# Esto nos ayuda a ver exactamente qué hace Flyway al iniciar
logging.level.org.flywaydb=DEBUG