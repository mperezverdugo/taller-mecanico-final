
# Identificación del Microservicio

spring.application.name=ms-cliente
server.port=8081


# Configuración de Base de Datos (MySQL)

spring.datasource.url=jdbc:mysql://localhost:3306/db_clientes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=


# Flyway: Gestión de Migraciones

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


# JPA / Hibernate
# Usamos 'none' porque Flyway es el dueño de la estructura de las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


#  Registro en Eureka

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuración personalizada de la ruta de Swagger
springdoc.api-docs.path=/ms-cliente/api-docs
springdoc.swagger-ui.path=/ms-cliente/swagger-ui.html


server.error.include-message=always
server.error.include-binding-errors=always