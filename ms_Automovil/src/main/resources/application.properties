# Identificación
spring.application.name=ms-automovil
server.port=8082

# Base de Datos (Apunta a db_automovil)
spring.datasource.url=jdbc:mysql://localhost:3306/db_automovil?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Flyway:
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JPA:
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# Si Flyway no encuentra nada, que la aplicación falle (así sabremos qué pasa)
spring.flyway.fail-on-missing-locations=true

# Forzamos la ruta exacta
spring.flyway.locations=classpath:/db/migration

# Activamos el log detallado de Flyway
logging.level.org.flywaydb=DEBUG