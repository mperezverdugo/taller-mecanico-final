# Puerto de entrada (8080)
server.port=8080
spring.application.name=ms-gateway

# Conexión Servidor de  Eureka (8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# 1 Clientes (8081)
spring.cloud.gateway.routes[0].id=ms-cliente
spring.cloud.gateway.routes[0].uri=lb://ms-cliente
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/clientes/**

# 2  Automóviles / Vehículos (8082)
spring.cloud.gateway.routes[1].id=ms-automovil
spring.cloud.gateway.routes[1].uri=lb://ms-automovil
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/vehiculos/**

# 3 Mecánicos (8083)
spring.cloud.gateway.routes[2].id=ms-mecanico
spring.cloud.gateway.routes[2].uri=lb://ms-mecanico
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/mecanicos/**

# 4 Órdenes de Trabajo ( 8084)
spring.cloud.gateway.routes[3].id=ms-orden-trabajo
spring.cloud.gateway.routes[3].uri=lb://ms-orden-trabajo
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ordenes/**
