# Puerto de entrada unificado
server.port=8080
spring.application.name=ms-gateway

# Conexión Servidor de Eureka (Cambiado a localhost para IntelliJ)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===================================================================
# 1. RUTAS OFICIALES PARA POSTMAN (Tus rutas actuales que ya funcionan)
# ===================================================================

# Clientes (8081)
spring.cloud.gateway.routes[0].id=ms-cliente-api
spring.cloud.gateway.routes[0].uri=lb://ms-cliente
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/clientes/**

# Automóviles / Vehículos (8082)
spring.cloud.gateway.routes[1].id=ms-automovil-api
spring.cloud.gateway.routes[1].uri=lb://ms-automovil
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/vehiculos/**

# Mecánicos (8083)
spring.cloud.gateway.routes[2].id=ms-mecanico-api
spring.cloud.gateway.routes[2].uri=lb://ms-mecanico
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/mecanicos/**

# Órdenes de Trabajo (8084)
spring.cloud.gateway.routes[3].id=ms-orden-trabajo-api
spring.cloud.gateway.routes[3].uri=lb://ms-orden-trabajo
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ordenes/**

# ===================================================================
# 2. RUTAS EXCLUSIVAS PARA EL ESCANEO DE SWAGGER (Paso directo sin filtros)
# ===================================================================

# Swagger Clientes
spring.cloud.gateway.routes[4].id=ms-cliente-swagger
spring.cloud.gateway.routes[4].uri=lb://ms-cliente
spring.cloud.gateway.routes[4].predicates[0]=Path=/ms-cliente/api-docs

# Swagger Automóviles
spring.cloud.gateway.routes[5].id=ms-automovil-swagger
spring.cloud.gateway.routes[5].uri=lb://ms-automovil
spring.cloud.gateway.routes[5].predicates[0]=Path=/ms-automovil/api-docs

# Swagger Mecánicos
spring.cloud.gateway.routes[6].id=ms-mecanico-swagger
spring.cloud.gateway.routes[6].uri=lb://ms-mecanico
spring.cloud.gateway.routes[6].predicates[0]=Path=/ms-mecanico/api-docs

# Swagger Órdenes de Trabajo
spring.cloud.gateway.routes[7].id=ms-orden-trabajo-swagger
spring.cloud.gateway.routes[7].uri=lb://ms-orden-trabajo
spring.cloud.gateway.routes[7].predicates[0]=Path=/ms-orden-trabajo/api-docs

# ===================================================================
# 3. AGREGACIÓN DE SWAGGER UI (Mapeo exacto a las rutas de tus componentes)
# ===================================================================
springdoc.swagger-ui.urls[0].name=1. Módulo Clientes
springdoc.swagger-ui.urls[0].url=/ms-cliente/api-docs

springdoc.swagger-ui.urls[1].name=2. Módulo Vehículos
springdoc.swagger-ui.urls[1].url=/ms-automovil/api-docs

springdoc.swagger-ui.urls[2].name=3. Módulo Mecánicos
springdoc.swagger-ui.urls[2].url=/ms-mecanico/api-docs

springdoc.swagger-ui.urls[3].name=4. Módulo Órdenes de Trabajo
springdoc.swagger-ui.urls[3].url=/ms-orden-trabajo/api-docs

# ===================================================================
# 4. CONFIGURACIÓN DE CORS GLOBAL OPERATIVO
# ===================================================================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*


# Forzar a OpenAPI a usar el Gateway para los botones 'Try it out'
springdoc.openapi.servers[0].url=http://localhost:8080
springdoc.openapi.servers[0].description=API Gateway Router

# Forzar a que se reenvíen las cabeceras del proxy (impide que se expongan las IPs internas de Docker)
server.forward-headers-strategy=framework
