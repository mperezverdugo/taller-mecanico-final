
# Identificación del Microservicio

spring.application.name=ms-cliente
server.port=8081


# Configuración de Base de Datos (MySQL)

spring.datasource.url=jdbc:mysql://localhost:3306/db_clientes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=


# Flyway: Gestión de Migraciones

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


# JPA / Hibernate
# Usamos 'none' porque Flyway es el dueño de la estructura de las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# INFRAESTRUCTURA: Registro en Eureka
# Esta es la dirección del "jefe" donde este microservicio se inscribirá
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Opcional: Ayuda a identificar la instancia más rápido en el panel
eureka.instance.prefer-ip-address=true