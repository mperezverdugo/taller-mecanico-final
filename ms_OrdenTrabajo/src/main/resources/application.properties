# Identificación del Microservicio

spring.application.name=ms-orden-trabajo
server.port=8084


# Configuración de Base de Datos (MySQL)

spring.datasource.url=jdbc:mysql://localhost:3306/db_orden_trabajo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=


# Flyway: Gestión de Migraciones

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Seguridad extra: Si no hay archivos de migración, la app avisa y se detiene
spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:/db/migration


# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# Registro en Eureka

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

#Forzar la visualizacion de mensajes nativos :
server.error.include-message=always